apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardrail-gateway
  namespace: ai-gateway
  labels:
    app.kubernetes.io/name: guardrail-gateway
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: secure-ai-sandbox
  annotations:
    # Trigger rolling restart on Secret change (used with Reloader or similar)
    secret.reloader.stakater.com/reload: "guardrail-gateway-secrets"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: guardrail-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero-downtime deployments
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guardrail-gateway
        app.kubernetes.io/version: "1.0.0"
      annotations:
        # Prometheus scrape annotations
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: guardrail-gateway-sa

      # Spread pods across zones for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: guardrail-gateway

      # No service account token auto-mounting at pod spec level;
      # the SA handles token projection for Workload Identity.
      automountServiceAccountToken: true

      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: gateway
          # Replace with your actual Artifact Registry path
          image: us-central1-docker.pkg.dev/<PROJECT_ID>/secure-ai-sandbox-registry/secure-ai-gateway:1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: guardrail-gateway-secrets
                  key: anthropic-api-key
            - name: LOG_LEVEL
              value: "INFO"
            - name: LOG_JSON
              value: "true"
            - name: MAX_PROMPT_LENGTH
              value: "4000"
            - name: RATE_LIMIT_PER_MINUTE
              value: "60"

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: var-cache
              mountPath: /var/cache

      volumes:
        # tmpfs volumes satisfy read-only rootfs requirements for uvicorn temp files
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: var-cache
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi

      # Graceful termination — allow in-flight requests to complete
      terminationGracePeriodSeconds: 30
