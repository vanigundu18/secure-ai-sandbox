apiVersion: v1
kind: ServiceAccount
metadata:
  name: guardrail-gateway-sa
  namespace: ai-gateway
  annotations:
    # Workload Identity: binds this KSA to the GCP Service Account so the pod
    # can call Google APIs without mounting a key file.
    # Replace <PROJECT_ID> with your actual GCP project ID.
    iam.gke.io/gcp-service-account: secure-ai-sandbox-gateway-sa@<PROJECT_ID>.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/name: guardrail-gateway
    app.kubernetes.io/component: serviceaccount
automountServiceAccountToken: true  # Required for Workload Identity token projection
